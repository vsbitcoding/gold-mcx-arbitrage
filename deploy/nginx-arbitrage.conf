# arbitrage.bitcoding.ai - Gold MCX Arbitrage (React static + FastAPI)
# DROP-IN replacement for /etc/nginx/sites-available/arbitrage.bitcoding.ai.conf
server {
    server_name arbitrage.bitcoding.ai;

    client_max_body_size 5m;
    server_tokens off;
    include /etc/nginx/snippets/favicon-204.conf;

    root /var/www/arbitrage;
    index index.html;

    # Rate-limited login
    location = /api/auth/login {
        limit_req zone=arb_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/arb-security-headers.conf;
    }

    # Backend REST
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/arb-security-headers.conf;
    }

    # WebSocket (kept for future)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: serve built React assets, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/arb-security-headers.conf;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Long-cache hashed Vite assets
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/arbitrage.bitcoding.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arbitrage.bitcoding.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = arbitrage.bitcoding.ai) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name arbitrage.bitcoding.ai;
    return 404;
}
