server {
    listen 80;
    server_name arbitrage.bitcoding.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name arbitrage.bitcoding.ai;

    ssl_certificate /etc/letsencrypt/live/arbitrage.bitcoding.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arbitrage.bitcoding.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 8M;

    root /opt/arbi/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/arbi_access.log;
    error_log  /var/log/nginx/arbi_error.log;
}
